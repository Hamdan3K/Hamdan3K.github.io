<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hamdan — Start</title>
<style>
  :root {
    --bg: #dfe6ee;
    --bar-bg: #ffffff;
    --text: #1f2937;
    --muted: #64748b;
    --tile-bg: #ffffff;
    --shadow: rgba(30, 41, 59, 0.15);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #202b3c;
      --bar-bg: #2b384d;
      --text: #e5e9f0;
      --muted: #93a1b7;
      --tile-bg: #2b384d;
      --shadow: rgba(0, 0, 0, 0.4);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10vh 1rem 2rem;
  }
  .search-bar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    width: 100%;
    max-width: 560px;
    background: var(--bar-bg);
    border-radius: 999px;
    padding: 0.9rem 1.4rem;
    box-shadow: 0 8px 24px var(--shadow);
  }
  .search-bar svg {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    color: var(--muted);
  }
  .search-bar input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-size: 1rem;
    color: var(--text);
    font-family: inherit;
  }
  .search-bar input::placeholder {
    color: var(--muted);
  }
  .apps-grid {
    margin-top: 4rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1.75rem;
    justify-content: center;
  }
  .app-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
    width: 96px;
    text-decoration: none;
    color: var(--text);
  }
  .app-icon {
    width: 72px;
    height: 72px;
    border-radius: 18px;
    background: var(--tile-bg);
    box-shadow: 0 6px 18px var(--shadow);
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 4px;
    padding: 12px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .app-tile:hover .app-icon {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 10px 24px var(--shadow);
  }
  .app-icon span {
    border-radius: 3px;
    background: var(--muted);
    opacity: 0.35;
  }
  .app-icon span.mark {
    opacity: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 0.8rem;
    background: transparent;
  }
  .app-icon span.mark.x { color: #00732f; }
  .app-icon span.mark.o { color: #c8102e; }
  .app-icon.c4 {
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(3, 1fr);
    background: #00732f;
    padding: 8px;
  }
  .app-icon.c4 span {
    border-radius: 50%;
    opacity: 1;
    background: var(--tile-bg);
  }
  .app-icon.c4 span.red { background: #c8102e; }
  .app-icon.c4 span.gold { background: #d4af37; }
  .app-icon.snake {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #a7d129;
    font-size: 2.1rem;
  }
  .app-icon.miner {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #78716c;
    font-size: 2.1rem;
  }
  .app-icon.parkour {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #7dd3fc;
    font-size: 2.1rem;
  }
  .app-tile.hidden {
    display: none;
  }
  .app-label {
    font-size: 0.8rem;
    font-weight: 500;
    text-align: center;
  }
</style>
</head>
<body>
  <form class="search-bar" id="searchForm">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="7"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    <input type="text" id="searchInput" placeholder="Search my games" autocomplete="off">
  </form>

  <div class="apps-grid">
    <a class="app-tile" href="./tictactoe/">
      <div class="app-icon">
        <span></span><span class="mark x">X</span><span></span>
        <span class="mark o">O</span><span></span><span></span>
        <span></span><span></span><span class="mark x">X</span>
      </div>
      <span class="app-label">Tic-Tac-Toe</span>
    </a>
    <a class="app-tile" href="./connect4/">
      <div class="app-icon c4">
        <span></span><span class="red"></span><span></span><span></span>
        <span class="gold"></span><span class="red"></span><span></span><span></span>
        <span class="gold"></span><span class="gold"></span><span class="red"></span><span></span>
      </div>
      <span class="app-label">Connect 4</span>
    </a>
    <a class="app-tile" href="./snake/">
      <div class="app-icon snake">🐍</div>
      <span class="app-label">Snake</span>
    </a>
    <a class="app-tile" href="./miner/">
      <div class="app-icon miner">⛏️</div>
      <span class="app-label">Rock Miner</span>
    </a>
    <a class="app-tile" href="./parkour/">
      <div class="app-icon parkour">🏃</div>
      <span class="app-label">Stickman Parkour</span>
    </a>
  </div>

<script>
(function () {
  const form = document.getElementById('searchForm');
  const input = document.getElementById('searchInput');
  const tiles = Array.from(document.querySelectorAll('.app-tile'));

  function applyFilter() {
    const q = input.value.trim().toLowerCase();
    tiles.forEach(tile => {
      const name = tile.querySelector('.app-label').textContent.toLowerCase();
      tile.classList.toggle('hidden', q !== '' && !name.includes(q));
    });
  }

  input.addEventListener('input', applyFilter);

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const match = tiles.find(t => !t.classList.contains('hidden'));
    if (match) window.location.href = match.getAttribute('href');
  });
})();
</script>
</body>
</html>
