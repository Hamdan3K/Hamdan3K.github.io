<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stickman Fighter — Hamdan</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --hp-player: #34d399;
    --hp-cpu: #ef4444;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --accent: #0284c7;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--card);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    width: 100%;
    min-height: 100vh;
    background: var(--card);
    padding: 2.5rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  h1 {
    font-weight: 800;
    font-size: 2rem;
    margin-bottom: 0.4rem;
    color: var(--accent);
  }
  .level-label {
    color: var(--muted);
    font-size: 0.95rem;
    margin-bottom: 1rem;
  }
  .bars {
    display: flex;
    gap: 1.5rem;
    width: min(95vw, 640px);
    margin-bottom: 1rem;
  }
  .bar-wrap {
    flex: 1;
  }
  .bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.25rem;
  }
  .bar-track {
    height: 14px;
    border-radius: 8px;
    background: var(--bg);
    overflow: hidden;
    border: 1px solid var(--muted);
  }
  .bar-fill {
    height: 100%;
    transition: width 0.15s ease;
  }
  .bar-fill.player { background: var(--hp-player); }
  .bar-fill.cpu { background: var(--hp-cpu); }
  canvas {
    width: min(95vw, 640px);
    height: auto;
    border-radius: 12px;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
    margin-bottom: 1rem;
  }
  .hint {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 1.25rem;
  }
  .hint kbd {
    background: var(--bg);
    border: 1px solid var(--muted);
    border-radius: 5px;
    padding: 0.1rem 0.5rem;
    font-family: inherit;
  }
  .action-row {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }
  .action-btn-game {
    position: relative;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 700;
    border-radius: 12px;
    padding: 0.7rem 1.5rem;
    border: none;
    cursor: pointer;
    color: #fff;
    overflow: hidden;
  }
  #attackBtn { background: #dc2626; }
  #defendBtn { background: #2563eb; }
  .action-btn-game .cooldown-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
    transform-origin: left;
  }
  .controls {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  button.plain {
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    border-radius: 10px;
    padding: 0.55rem 1.1rem;
    border: 1px solid var(--muted);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  button.plain:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .back-btn {
    position: fixed;
    top: 1.25rem;
    left: 1.25rem;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    border: 1px solid var(--muted);
    box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    z-index: 20;
  }
  .home-icon {
    font-size: 1.3rem;
    line-height: 1;
    filter: grayscale(1) brightness(0);
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 15;
  }
  .overlay.open { display: flex; }
  .overlay-panel {
    background: var(--card);
    border-radius: 16px;
    padding: 2rem;
    text-align: center;
    max-width: 360px;
    width: 90%;
  }
  .overlay-panel h2 {
    margin-bottom: 0.75rem;
    color: var(--accent);
  }
  .overlay-panel p {
    color: var(--muted);
    margin-bottom: 1.25rem;
  }
</style>
</head>
<body>
  <a class="back-btn" href="/" aria-label="Back to home"><span class="home-icon">&#127968;</span></a>

  <main class="card">
    <h1>Stickman Fighter</h1>
    <div class="level-label">Level <span id="levelNum">1</span>/4 — Weapon: <span id="weaponName">Stick</span></div>

    <div class="bars">
      <div class="bar-wrap">
        <div class="bar-label"><span>You</span><span id="playerHpText">10/10</span></div>
        <div class="bar-track"><div class="bar-fill player" id="playerBar" style="width:100%"></div></div>
      </div>
      <div class="bar-wrap">
        <div class="bar-label"><span>Computer</span><span id="cpuHpText">20/20</span></div>
        <div class="bar-track"><div class="bar-fill cpu" id="cpuBar" style="width:100%"></div></div>
      </div>
    </div>

    <canvas id="scene" width="640" height="320"></canvas>

    <p class="hint">
      <kbd>&larr;</kbd>/<kbd>A</kbd> back &nbsp; <kbd>&rarr;</kbd> forward &nbsp; <kbd>&uarr;</kbd>/<kbd>W</kbd> jump (dodge!) &nbsp;
      <kbd>Space</kbd> attack &nbsp; <kbd>D</kbd> defense bubble (heals you, 3s cooldown)
    </p>

    <div class="action-row">
      <button class="action-btn-game" id="leftBtn" style="background:#475569;">&larr;</button>
      <button class="action-btn-game" id="jumpBtn" style="background:#475569;">Jump</button>
      <button class="action-btn-game" id="rightBtn" style="background:#475569;">&rarr;</button>
    </div>
    <div class="action-row">
      <button class="action-btn-game" id="attackBtn">Attack<div class="cooldown-overlay" id="attackCd" style="transform:scaleX(0)"></div></button>
      <button class="action-btn-game" id="defendBtn">Defend<div class="cooldown-overlay" id="defendCd" style="transform:scaleX(0)"></div></button>
    </div>

    <div class="controls">
      <button class="plain" id="reset">Restart</button>
    </div>
  </main>

  <div class="overlay" id="overlay">
    <div class="overlay-panel">
      <h2 id="overlayTitle">Level Cleared!</h2>
      <p id="overlayText">You defeated the computer.</p>
      <button class="action-btn-game" id="overlayBtn" style="background:#16a34a;">Continue</button>
    </div>
  </div>

<script>
(function () {
  const canvas = document.getElementById('scene');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const GROUND_Y = 260;

  const levelNumEl = document.getElementById('levelNum');
  const weaponNameEl = document.getElementById('weaponName');
  const playerBar = document.getElementById('playerBar');
  const cpuBar = document.getElementById('cpuBar');
  const playerHpText = document.getElementById('playerHpText');
  const cpuHpText = document.getElementById('cpuHpText');
  const attackBtn = document.getElementById('attackBtn');
  const defendBtn = document.getElementById('defendBtn');
  const attackCd = document.getElementById('attackCd');
  const defendCd = document.getElementById('defendCd');
  const resetBtn = document.getElementById('reset');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayText = document.getElementById('overlayText');
  const overlayBtn = document.getElementById('overlayBtn');

  const PLAYER_MAX_HP = 10;
  const WEAPONS = [
    { name: 'Stick', damage: 0.5, color: '#92400e', length: 30, width: 6, kind: 'stick' },
    { name: 'Sword', damage: 1, color: '#cbd5e1', length: 40, width: 8, kind: 'sword' },
    { name: 'Blood Katana', damage: 2, color: '#7f1d1d', length: 46, width: 7, kind: 'katana' },
    { name: 'Thunder Hammer', damage: 3, color: '#94a3b8', length: 36, width: 16, kind: 'hammer' }
  ];
  const CPU_CONFIG = [
    { hp: 20, interval: 1.5, damage: 1 },
    { hp: 30, interval: 1.2, damage: 1 },
    { hp: 40, interval: 1.0, damage: 2 },
    { hp: 50, interval: 0.85, damage: 2 }
  ];

  const ATTACK_COOLDOWN = 0.45;
  const SHIELD_DURATION = 1.5;
  const SHIELD_COOLDOWN = 3.0;
  const HEAL_RATE = 2;
  const ATTACK_TELEGRAPH = 0.35;
  const CPU_X = W - 150;
  const HIT_RANGE = 120;
  const MOVE_SPEED = 200;
  const JUMP_VELOCITY = 300;
  const GRAVITY = 900;
  const PLAYER_MIN_X = 60;
  const PLAYER_MAX_X = CPU_X - 60;

  let level = 1;
  let playerHp, cpuHp, cpuMaxHp;
  let attackCdLeft = 0, shieldCdLeft = 0, shieldTimeLeft = 0;
  let playerSwing = 0, cpuSwing = 0;
  let playerHitFlash = 0, cpuHitFlash = 0;
  let popups = [];
  let cpuAttackTimer = 0, cpuTelegraph = 0;
  let gameActive = true;
  let paused = false;
  let playerX = 150;
  let playerJumpH = 0, playerJumpV = 0;
  const moveKeys = { left: false, right: false };

  function weapon() { return WEAPONS[level - 1]; }
  function cpuConf() { return CPU_CONFIG[level - 1]; }
  function isJumping() { return playerJumpH > 0; }

  function startLevel(n) {
    level = n;
    playerHp = PLAYER_MAX_HP;
    cpuMaxHp = cpuConf().hp;
    cpuHp = cpuMaxHp;
    attackCdLeft = 0;
    shieldCdLeft = 0;
    shieldTimeLeft = 0;
    cpuAttackTimer = cpuConf().interval;
    cpuTelegraph = 0;
    gameActive = true;
    paused = false;
    popups = [];
    playerX = 150;
    playerJumpH = 0;
    playerJumpV = 0;
    levelNumEl.textContent = level;
    weaponNameEl.textContent = weapon().name;
    updateBars();
    overlay.classList.remove('open');
  }

  function updateBars() {
    playerBar.style.width = Math.max(0, (playerHp / PLAYER_MAX_HP) * 100) + '%';
    cpuBar.style.width = Math.max(0, (cpuHp / cpuMaxHp) * 100) + '%';
    playerHpText.textContent = Math.max(0, Math.round(playerHp * 10) / 10) + '/' + PLAYER_MAX_HP;
    cpuHpText.textContent = Math.max(0, Math.round(cpuHp * 10) / 10) + '/' + cpuMaxHp;
  }

  function addPopup(x, y, text, color) {
    popups.push({ x, y, text, color, life: 1 });
  }

  function playerAttack() {
    if (!gameActive || paused || attackCdLeft > 0) return;
    attackCdLeft = ATTACK_COOLDOWN;
    playerSwing = 1;
    const inRange = Math.abs(playerX - CPU_X) <= HIT_RANGE;
    if (!inRange) {
      addPopup(playerX, GROUND_Y - 140, 'MISS', '#94a3b8');
      return;
    }
    const dmg = weapon().damage;
    cpuHp = Math.max(0, cpuHp - dmg);
    cpuHitFlash = 1;
    addPopup(CPU_X, GROUND_Y - 140, '-' + dmg, '#fca5a5');
    updateBars();
    if (cpuHp <= 0) {
      gameActive = false;
      setTimeout(() => onLevelClear(), 300);
    }
  }

  function playerDefend() {
    if (!gameActive || paused || shieldCdLeft > 0) return;
    shieldTimeLeft = SHIELD_DURATION;
    shieldCdLeft = SHIELD_COOLDOWN;
  }

  function resolveCpuAttack() {
    cpuSwing = 1;
    const inRange = Math.abs(playerX - CPU_X) <= HIT_RANGE;
    if (!inRange) {
      addPopup(playerX, GROUND_Y - 140, 'DODGE!', '#4ade80');
      return;
    }
    if (isJumping()) {
      addPopup(playerX, GROUND_Y - 140, 'DODGE!', '#4ade80');
      return;
    }
    if (shieldTimeLeft > 0) {
      addPopup(playerX, GROUND_Y - 140, 'BLOCKED', '#60a5fa');
      return;
    }
    const dmg = cpuConf().damage;
    playerHp = Math.max(0, playerHp - dmg);
    playerHitFlash = 1;
    addPopup(playerX, GROUND_Y - 140, '-' + dmg, '#fca5a5');
    updateBars();
    if (playerHp <= 0) {
      gameActive = false;
      setTimeout(() => onGameOver(), 300);
    }
  }

  function onLevelClear() {
    paused = true;
    if (level >= 4) {
      overlayTitle.textContent = 'Champion!';
      overlayText.textContent = 'You defeated every challenger across all 4 levels!';
      overlayBtn.textContent = 'Play Again';
    } else {
      overlayTitle.textContent = 'Level Cleared!';
      overlayText.textContent = 'You defeated the computer. Get ready for level ' + (level + 1) + '.';
      overlayBtn.textContent = 'Continue';
    }
    overlay.classList.add('open');
  }

  function onGameOver() {
    paused = true;
    overlayTitle.textContent = 'You Were Defeated';
    overlayText.textContent = 'The computer beat you on level ' + level + '. Try again?';
    overlayBtn.textContent = 'Retry Level';
    overlay.classList.add('open');
  }

  overlayBtn.addEventListener('click', () => {
    if (overlayTitle.textContent === 'Champion!') {
      startLevel(1);
    } else if (overlayTitle.textContent === 'Level Cleared!') {
      startLevel(level + 1);
    } else {
      startLevel(level);
    }
  });
  resetBtn.addEventListener('click', () => startLevel(1));

  function drawStick(cx, cy, color, swing, hitFlash, weaponConf, facing) {
    const c = hitFlash > 0 ? '#ffffff' : color;
    ctx.strokeStyle = c;
    ctx.fillStyle = c;
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';

    const headY = cy - 70;
    ctx.beginPath();
    ctx.arc(cx, headY, 14, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(cx, headY + 14);
    ctx.lineTo(cx, cy - 15);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx, cy - 15);
    ctx.lineTo(cx - 14 * facing, cy);
    ctx.moveTo(cx, cy - 15);
    ctx.lineTo(cx + 14 * facing, cy);
    ctx.stroke();

    const armSwing = swing > 0 ? Math.sin(swing * Math.PI) * 40 : 0;
    const armX = cx + facing * (24 + armSwing);
    const armY = cy - 40 - armSwing * 0.3;
    ctx.beginPath();
    ctx.moveTo(cx, cy - 40);
    ctx.lineTo(armX, armY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx, cy - 40);
    ctx.lineTo(cx - facing * 16, cy - 20);
    ctx.stroke();

    if (weaponConf) {
      ctx.save();
      ctx.translate(armX, armY);
      const angle = facing > 0 ? -0.6 - (swing > 0 ? swing * 1.2 : 0) : Math.PI + 0.6 + (swing > 0 ? swing * 1.2 : 0);
      ctx.rotate(angle);
      if (weaponConf.kind === 'hammer') {
        ctx.strokeStyle = '#78350f';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(weaponConf.length, 0);
        ctx.stroke();
        ctx.fillStyle = weaponConf.color;
        ctx.fillRect(weaponConf.length - 6, -weaponConf.width / 2, 16, weaponConf.width);
      } else {
        ctx.strokeStyle = weaponConf.kind === 'stick' ? weaponConf.color : '#3f3f46';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(weaponConf.length * 0.3, 0);
        ctx.stroke();
        ctx.fillStyle = weaponConf.color;
        if (weaponConf.kind === 'stick') {
          ctx.fillRect(weaponConf.length * 0.3, -2, weaponConf.length * 0.7, 4);
        } else {
          const bladeLen = weaponConf.length * 0.75;
          ctx.beginPath();
          ctx.moveTo(weaponConf.length * 0.3, -weaponConf.width / 2);
          ctx.lineTo(weaponConf.length * 0.3 + bladeLen, 0);
          ctx.lineTo(weaponConf.length * 0.3, weaponConf.width / 2);
          ctx.closePath();
          ctx.fill();
        }
      }
      ctx.restore();
    }

    ctx.strokeStyle = c;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx - 12, GROUND_Y);
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + 12, GROUND_Y);
    ctx.stroke();
  }

  function drawShield(cx, cy) {
    if (shieldTimeLeft <= 0) return;
    const pulse = 1 + Math.sin(performance.now() / 120) * 0.04;
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#38bdf8';
    ctx.beginPath();
    ctx.arc(cx, cy - 40, 65 * pulse, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.8;
    ctx.strokeStyle = '#7dd3fc';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.restore();
  }

  function drawPopups() {
    popups.forEach(p => {
      ctx.globalAlpha = Math.max(p.life, 0);
      ctx.fillStyle = p.color;
      ctx.font = 'bold 20px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(p.text, p.x, p.y - (1 - p.life) * 50);
      ctx.globalAlpha = 1;
    });
  }

  function drawArena() {
    const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    grad.addColorStop(0, '#1e293b');
    grad.addColorStop(1, '#334155');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, GROUND_Y);
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y);
    ctx.lineTo(W, GROUND_Y);
    ctx.stroke();
  }

  function drawTelegraph() {
    if (cpuTelegraph <= 0) return;
    const pulse = 0.6 + Math.sin(performance.now() / 60) * 0.4;
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#facc15';
    ctx.font = 'bold 26px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('!', CPU_X, GROUND_Y - 190);
    ctx.restore();
  }

  function render() {
    const playerY = GROUND_Y - playerJumpH;
    drawArena();
    drawShield(playerX, playerY);
    drawStick(playerX, playerY, '#e2e8f0', playerSwing, playerHitFlash, weapon(), 1);
    drawStick(CPU_X, GROUND_Y, '#f87171', cpuSwing, cpuHitFlash, null, -1);
    drawTelegraph();
    drawPopups();
  }

  let lastTime = performance.now();
  function loop() {
    const now = performance.now();
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;

    if (gameActive && !paused) {
      if (attackCdLeft > 0) attackCdLeft = Math.max(0, attackCdLeft - dt);
      if (shieldCdLeft > 0) shieldCdLeft = Math.max(0, shieldCdLeft - dt);
      if (shieldTimeLeft > 0) {
        shieldTimeLeft = Math.max(0, shieldTimeLeft - dt);
        playerHp = Math.min(PLAYER_MAX_HP, playerHp + HEAL_RATE * dt);
        updateBars();
      }

      if (moveKeys.left) playerX -= MOVE_SPEED * dt;
      if (moveKeys.right) playerX += MOVE_SPEED * dt;
      playerX = Math.max(PLAYER_MIN_X, Math.min(PLAYER_MAX_X, playerX));

      if (playerJumpH > 0 || playerJumpV > 0) {
        playerJumpV -= GRAVITY * dt;
        playerJumpH = Math.max(0, playerJumpH + playerJumpV * dt);
        if (playerJumpH <= 0) { playerJumpH = 0; playerJumpV = 0; }
      }

      if (cpuTelegraph > 0) {
        cpuTelegraph -= dt;
        if (cpuTelegraph <= 0) resolveCpuAttack();
      } else {
        cpuAttackTimer -= dt;
        if (cpuAttackTimer <= 0) {
          cpuTelegraph = ATTACK_TELEGRAPH;
          cpuAttackTimer = cpuConf().interval;
        }
      }
    }

    if (playerSwing > 0) playerSwing = Math.max(0, playerSwing - dt * 3);
    if (cpuSwing > 0) cpuSwing = Math.max(0, cpuSwing - dt * 3);
    if (playerHitFlash > 0) playerHitFlash = Math.max(0, playerHitFlash - dt * 4);
    if (cpuHitFlash > 0) cpuHitFlash = Math.max(0, cpuHitFlash - dt * 4);
    popups.forEach(p => p.life -= dt * 1.4);
    popups = popups.filter(p => p.life > 0);

    attackCd.style.transform = 'scaleX(' + (attackCdLeft / ATTACK_COOLDOWN) + ')';
    defendCd.style.transform = 'scaleX(' + (shieldCdLeft / SHIELD_COOLDOWN) + ')';

    render();
    requestAnimationFrame(loop);
  }

  function jump() {
    if (!gameActive || paused || playerJumpH > 0) return;
    playerJumpV = JUMP_VELOCITY;
  }

  window.addEventListener('keydown', (e) => {
    if (['Space', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'KeyW', 'KeyA'].includes(e.code)) e.preventDefault();
    if (e.code === 'Space') { if (!e.repeat) playerAttack(); }
    if (e.code === 'KeyD') { if (!e.repeat) playerDefend(); }
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveKeys.left = true;
    if (e.code === 'ArrowRight') moveKeys.right = true;
    if ((e.code === 'ArrowUp' || e.code === 'KeyW') && !e.repeat) jump();
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveKeys.left = false;
    if (e.code === 'ArrowRight') moveKeys.right = false;
  });

  attackBtn.addEventListener('click', playerAttack);
  defendBtn.addEventListener('click', playerDefend);
  document.getElementById('jumpBtn').addEventListener('click', jump);

  function bindHold(el, onDown, onUp) {
    el.addEventListener('mousedown', onDown);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); onDown(); }, { passive: false });
    el.addEventListener('mouseup', onUp);
    el.addEventListener('mouseleave', onUp);
    el.addEventListener('touchend', (e) => { e.preventDefault(); onUp(); }, { passive: false });
  }
  bindHold(document.getElementById('leftBtn'), () => moveKeys.left = true, () => moveKeys.left = false);
  bindHold(document.getElementById('rightBtn'), () => moveKeys.right = true, () => moveKeys.right = false);

  startLevel(1);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
