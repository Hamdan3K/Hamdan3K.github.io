<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe — Hamdan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@500;700&family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #f1e3c2;
    --sand-dark: #e3cf9c;
    --card: #faf3e0;
    --text: #3b2c1a;
    --muted: #8a7048;
    --gold: #b8860b;
    --gold-light: #d4af37;
    --green: #00732f;
    --red: #c8102e;
    --black: #14110d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Cairo", "Segoe UI", sans-serif;
    background-color: var(--sand);
    background-image:
      radial-gradient(circle at 20% 20%, rgba(184,134,11,0.12) 0, transparent 45%),
      radial-gradient(circle at 80% 80%, rgba(0,115,47,0.10) 0, transparent 45%),
      repeating-linear-gradient(45deg, rgba(184,134,11,0.06) 0 2px, transparent 2px 26px),
      repeating-linear-gradient(-45deg, rgba(184,134,11,0.06) 0 2px, transparent 2px 26px);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .card {
    max-width: 420px;
    width: 100%;
    background: var(--card);
    border-radius: 14px;
    padding: 2.5rem 2rem 2rem;
    box-shadow: 0 20px 60px rgba(20,17,13,0.25);
    text-align: center;
    border: 2px solid var(--gold);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: linear-gradient(to right,
      var(--red) 0 12%,
      var(--green) 12% 41%, var(--card) 41% 42%,
      #ffffff 42% 71%, var(--card) 71% 72%,
      var(--black) 72% 100%);
  }
  a.back {
    display: inline-block;
    margin: 1rem 0 1.25rem;
    color: var(--muted);
    text-decoration: none;
    font-size: 0.9rem;
  }
  a.back:hover { color: var(--green); }
  h1 {
    font-family: "Amiri", "Cairo", serif;
    font-weight: 700;
    font-size: 2.5rem;
    letter-spacing: 0.03em;
    margin-bottom: 0.15rem;
    color: var(--gold);
    text-shadow: 0 1px 0 rgba(255,255,255,0.4);
  }
  .subtitle {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }
  .difficulty-row {
    margin-bottom: 1.25rem;
  }
  .status {
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 1.5rem;
    min-height: 1.4rem;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 10px;
    margin: 0 auto 1.75rem;
    width: 100%;
    max-width: 300px;
    aspect-ratio: 1 / 1;
  }
  .cell {
    aspect-ratio: 1 / 1;
    background: var(--sand-dark);
    border: 2px solid var(--gold);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Reem Kufi", sans-serif;
    font-size: 2.5rem;
    font-weight: 700;
    cursor: pointer;
    color: var(--green);
    transition: border-color 0.15s ease, transform 0.1s ease;
    user-select: none;
  }
  .cell:hover:not(.taken):not(.disabled) {
    border-color: var(--gold-light);
    transform: scale(1.03);
  }
  .cell.taken, .cell.disabled {
    cursor: default;
  }
  .cell.o {
    color: var(--red);
  }
  .cell.win {
    border-color: var(--black);
    background: var(--gold-light);
    color: var(--black);
  }
  .cell.selected {
    border-color: var(--red);
    box-shadow: inset 0 0 0 3px rgba(200, 16, 46, 0.4), 0 0 16px rgba(200, 16, 46, 0.65);
    transform: scale(1.06);
  }
  .hint {
    font-size: 0.78rem;
    color: var(--muted);
    margin: 0 0 1.25rem;
  }
  .controls {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  button, select {
    font-family: "Cairo", inherit;
    font-size: 0.9rem;
    font-weight: 600;
    border-radius: 8px;
    padding: 0.55rem 1.1rem;
    border: 1.5px solid var(--gold);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
  }
  button:hover, select:hover {
    border-color: var(--green);
    color: var(--green);
    background: var(--sand);
  }
  select {
    cursor: pointer;
  }
  footer {
    margin-top: 2rem;
    color: var(--muted);
    font-size: 0.8rem;
  }
</style>
</head>
<body>
  <main class="card">
    <a class="back" href="./">&larr; Back to home</a>
    <h1>Tic-Tac-Toe</h1>
    <div class="subtitle">Emirati Heritage Edition</div>
    <div class="difficulty-row">
      <select id="difficulty">
        <option value="unbeatable" selected>Unbeatable</option>
        <option value="hard">Hard</option>
        <option value="easy">Easy</option>
      </select>
    </div>
    <p class="hint">Each player keeps 3 marks on the board — once you've placed 3, tap one of your X's then an empty cell to relocate it. No draws: play continues until someone lines up 3.</p>
    <div class="status" id="status">Your move — place an X</div>
    <div class="board" id="board"></div>
    <div class="controls">
      <button id="reset">New Game</button>
    </div>
    <footer>You: X &nbsp;·&nbsp; Computer: O</footer>
  </main>

<script>
(function () {
  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const resetBtn = document.getElementById('reset');
  const difficultySel = document.getElementById('difficulty');

  const HUMAN = 'X';
  const AI = 'O';
  const WIN_LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  const MAX_MARKS = 3;
  const UNBEATABLE_DEPTH = 6;
  const HARD_DEPTH = 4;

  let board = Array(9).fill(null);
  let gameOver = false;
  let selected = null;
  let cells = [];

  function render() {
    boardEl.innerHTML = '';
    cells = board.map((val, i) => {
      const cell = document.createElement('div');
      let cls = 'cell';
      if (val) cls += ' taken';
      if (val === 'O') cls += ' o';
      if (i === selected) cls += ' selected';
      cell.className = cls;
      cell.textContent = val || '';
      cell.addEventListener('click', () => onCellClick(i));
      boardEl.appendChild(cell);
      return cell;
    });
  }

  function winner(b) {
    for (const line of WIN_LINES) {
      const [a, b1, c] = line;
      if (b[a] && b[a] === b[b1] && b[a] === b[c]) {
        return { player: b[a], line };
      }
    }
    return null;
  }

  function countMarks(b, mark) {
    return b.filter(v => v === mark).length;
  }

  function emptyCells(b) {
    return b.map((v, i) => (v ? null : i)).filter(v => v !== null);
  }

  function legalMoves(b, mark) {
    const empties = emptyCells(b);
    if (countMarks(b, mark) < MAX_MARKS) {
      return empties.map(to => ({ to }));
    }
    const pieces = b.map((v, i) => (v === mark ? i : null)).filter(v => v !== null);
    const moves = [];
    for (const from of pieces) {
      for (const to of empties) moves.push({ from, to });
    }
    return moves;
  }

  function applyMove(b, mark, move) {
    const nb = b.slice();
    if (move.from !== undefined) nb[move.from] = null;
    nb[move.to] = mark;
    return nb;
  }

  function evaluate(b) {
    let score = 0;
    for (const line of WIN_LINES) {
      const vals = line.map(i => b[i]);
      const aiCount = vals.filter(v => v === AI).length;
      const huCount = vals.filter(v => v === HUMAN).length;
      if (aiCount > 0 && huCount > 0) continue;
      if (aiCount === 2) score += 5;
      else if (aiCount === 1) score += 1;
      if (huCount === 2) score -= 5;
      else if (huCount === 1) score -= 1;
    }
    return score;
  }

  function minimax(b, isMaximizing, depth, maxDepth, alpha, beta) {
    const result = winner(b);
    if (result) return result.player === AI ? 1000 - depth : depth - 1000;
    if (depth >= maxDepth) return evaluate(b);
    const mark = isMaximizing ? AI : HUMAN;
    const moves = legalMoves(b, mark);
    if (isMaximizing) {
      let best = -Infinity;
      for (const move of moves) {
        const score = minimax(applyMove(b, AI, move), false, depth + 1, maxDepth, alpha, beta);
        best = Math.max(best, score);
        alpha = Math.max(alpha, score);
        if (beta <= alpha) break;
      }
      return best;
    }
    let best = Infinity;
    for (const move of moves) {
      const score = minimax(applyMove(b, HUMAN, move), true, depth + 1, maxDepth, alpha, beta);
      best = Math.min(best, score);
      beta = Math.min(beta, score);
      if (beta <= alpha) break;
    }
    return best;
  }

  function bestMoveGeneric(b, maxDepth) {
    let best = { score: -Infinity, move: null };
    for (const move of legalMoves(b, AI)) {
      const score = minimax(applyMove(b, AI, move), false, 1, maxDepth, -Infinity, Infinity);
      if (score > best.score) best = { score, move };
    }
    return best.move;
  }

  function chooseAiMove(b, difficulty) {
    const moves = legalMoves(b, AI);
    if (!moves.length) return null;
    if (difficulty === 'easy') return moves[Math.floor(Math.random() * moves.length)];
    if (difficulty === 'hard') {
      return Math.random() < 0.7 ? bestMoveGeneric(b, HARD_DEPTH) : moves[Math.floor(Math.random() * moves.length)];
    }
    return bestMoveGeneric(b, UNBEATABLE_DEPTH);
  }

  function updateStatusForHumanTurn() {
    statusEl.textContent = countMarks(board, HUMAN) < MAX_MARKS
      ? "Your move — place an X"
      : "Your move — tap an X, then an empty cell to move it";
  }

  function onCellClick(i) {
    if (gameOver) return;
    const humanCount = countMarks(board, HUMAN);

    if (humanCount < MAX_MARKS) {
      if (board[i]) return;
      board[i] = HUMAN;
      afterHumanMove();
      return;
    }

    if (selected === null) {
      if (board[i] === HUMAN) { selected = i; render(); }
      return;
    }
    if (i === selected) { selected = null; render(); return; }
    if (board[i] === HUMAN) { selected = i; render(); return; }
    if (board[i]) return;

    board[selected] = null;
    board[i] = HUMAN;
    selected = null;
    afterHumanMove();
  }

  function afterHumanMove() {
    render();
    const result = winner(board);
    if (result) return finish(result);
    statusEl.textContent = "Computer's move...";
    setTimeout(computerMove, 300);
  }

  function computerMove() {
    if (gameOver) return;
    const move = chooseAiMove(board, difficultySel.value);
    if (!move) return;
    board = applyMove(board, AI, move);
    render();
    const result = winner(board);
    if (result) return finish(result);
    updateStatusForHumanTurn();
  }

  function finish(result) {
    gameOver = true;
    result.line.forEach(i => cells[i].classList.add('win'));
    statusEl.textContent = result.player === HUMAN ? 'You win! 🎉' : 'Computer wins!';
    cells.forEach(c => c.classList.add('disabled'));
  }

  function newGame() {
    board = Array(9).fill(null);
    gameOver = false;
    selected = null;
    updateStatusForHumanTurn();
    render();
  }

  resetBtn.addEventListener('click', newGame);
  newGame();
})();
</script>
</body>
</html>
