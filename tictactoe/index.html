<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe — Hamdan</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --accent-2: #818cf8;
    --win: #34d399;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --accent: #0284c7;
      --accent-2: #4f46e5;
      --win: #059669;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--card);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    width: 100%;
    min-height: 100vh;
    background: var(--card);
    padding: 2.5rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  h1 {
    font-weight: 800;
    font-size: 2rem;
    margin-bottom: 1.25rem;
    color: var(--accent);
  }
  .difficulty-row {
    margin-bottom: 1.25rem;
  }
  .status {
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 1.5rem;
    min-height: 1.4rem;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 8px;
    margin: 0 auto 1.75rem;
    width: 100%;
    max-width: 340px;
    aspect-ratio: 1 / 1;
  }
  .cell {
    aspect-ratio: 1 / 1;
    background: var(--bg);
    border: 2px solid var(--muted);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    font-weight: 700;
    cursor: pointer;
    color: var(--accent);
    transition: border-color 0.15s ease, transform 0.1s ease;
    user-select: none;
  }
  .cell:hover:not(.taken):not(.disabled) {
    border-color: var(--accent);
    transform: scale(1.03);
  }
  .cell.taken, .cell.disabled {
    cursor: default;
  }
  .cell.o {
    color: var(--accent-2);
  }
  .cell.win {
    border-color: var(--win);
    color: var(--win);
  }
  .cell.selected {
    border-color: var(--accent-2);
    box-shadow: inset 0 0 0 3px rgba(129, 140, 248, 0.35), 0 0 14px rgba(129, 140, 248, 0.55);
    transform: scale(1.06);
  }
  .hint {
    font-size: 0.78rem;
    color: var(--muted);
    margin: 0 0 1.25rem;
  }
  .controls {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  button, select, a.button {
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    border-radius: 10px;
    padding: 0.55rem 1.1rem;
    border: 1px solid var(--muted);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  button:hover, select:hover, a.button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  select {
    cursor: pointer;
  }
  footer {
    margin-top: 2rem;
    color: var(--muted);
    font-size: 0.8rem;
  }
  .back-btn {
    position: fixed;
    top: 1.25rem;
    left: 1.25rem;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--card);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-size: 1.4rem;
    line-height: 1;
    border: 1px solid var(--muted);
    box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    transition: border-color 0.15s ease, color 0.15s ease, transform 0.15s ease;
  }
  .back-btn:hover {
    border-color: var(--accent);
    transform: translateX(-2px);
  }
  .home-icon {
    font-size: 1.3rem;
    line-height: 1;
    filter: grayscale(1) brightness(0);
  }
</style>
</head>
<body>
  <a class="back-btn" href="/" aria-label="Back to home"><span class="home-icon">&#127968;</span></a>
  <main class="card">
    <h1>Tic-Tac-Toe</h1>
    <div class="difficulty-row">
      <select id="difficulty">
        <option value="unbeatable" selected>Unbeatable</option>
        <option value="hard">Hard</option>
        <option value="easy">Easy</option>
      </select>
    </div>
    <p class="hint">4×4 board — get 4 in a row to win. Each player keeps 4 marks on the board; once you've placed 4, tap one of your X's then an empty cell to relocate it. No draws: play continues until someone lines up 4.</p>
    <div class="status" id="status">Your move — place an X</div>
    <div class="board" id="board"></div>
    <div class="controls">
      <button id="reset">New Game</button>
    </div>
    <footer>You: X &nbsp;·&nbsp; Computer: O</footer>
  </main>

<script>
(function () {
  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const resetBtn = document.getElementById('reset');
  const difficultySel = document.getElementById('difficulty');

  const HUMAN = 'X';
  const AI = 'O';
  const SIZE = 4;
  const WIN_LINES = (() => {
    const lines = [];
    for (let r = 0; r < SIZE; r++) lines.push([0, 1, 2, 3].map(c => r * SIZE + c));
    for (let c = 0; c < SIZE; c++) lines.push([0, 1, 2, 3].map(r => r * SIZE + c));
    lines.push([0, 1, 2, 3].map(i => i * SIZE + i));
    lines.push([0, 1, 2, 3].map(i => i * SIZE + (SIZE - 1 - i)));
    return lines;
  })();

  const MAX_MARKS = 4;

  let board = Array(SIZE * SIZE).fill(null);
  let gameOver = false;
  let selected = null;
  let cells = [];

  function render() {
    boardEl.innerHTML = '';
    cells = board.map((val, i) => {
      const cell = document.createElement('div');
      let cls = 'cell';
      if (val) cls += ' taken';
      if (val === 'O') cls += ' o';
      if (i === selected) cls += ' selected';
      cell.className = cls;
      cell.textContent = val || '';
      cell.addEventListener('click', () => onCellClick(i));
      boardEl.appendChild(cell);
      return cell;
    });
  }

  function winner(b) {
    for (const line of WIN_LINES) {
      const first = b[line[0]];
      if (first && line.every(i => b[i] === first)) {
        return { player: first, line };
      }
    }
    return null;
  }

  function countMarks(b, mark) {
    return b.filter(v => v === mark).length;
  }

  function emptyCells(b) {
    return b.map((v, i) => (v ? null : i)).filter(v => v !== null);
  }

  function legalMoves(b, mark) {
    const empties = emptyCells(b);
    if (countMarks(b, mark) < MAX_MARKS) {
      return empties.map(to => ({ to }));
    }
    const pieces = b.map((v, i) => (v === mark ? i : null)).filter(v => v !== null);
    const moves = [];
    for (const from of pieces) {
      for (const to of empties) moves.push({ from, to });
    }
    return moves;
  }

  function applyMove(b, mark, move) {
    const nb = b.slice();
    if (move.from !== undefined) nb[move.from] = null;
    nb[move.to] = mark;
    return nb;
  }

  function evaluate(b) {
    let score = 0;
    for (const line of WIN_LINES) {
      const vals = line.map(i => b[i]);
      const aiCount = vals.filter(v => v === AI).length;
      const huCount = vals.filter(v => v === HUMAN).length;
      if (aiCount > 0 && huCount > 0) continue;
      if (aiCount === 3) score += 12;
      else if (aiCount === 2) score += 4;
      else if (aiCount === 1) score += 1;
      if (huCount === 3) score -= 15;
      else if (huCount === 2) score -= 4;
      else if (huCount === 1) score -= 1;
    }
    return score;
  }

  function minimax(b, isMaximizing, depth, maxDepth, alpha, beta) {
    const result = winner(b);
    if (result) return result.player === AI ? 1000 - depth : depth - 1000;
    if (depth >= maxDepth) return evaluate(b);
    const mark = isMaximizing ? AI : HUMAN;
    const moves = legalMoves(b, mark);
    if (isMaximizing) {
      let best = -Infinity;
      for (const move of moves) {
        const score = minimax(applyMove(b, AI, move), false, depth + 1, maxDepth, alpha, beta);
        best = Math.max(best, score);
        alpha = Math.max(alpha, score);
        if (beta <= alpha) break;
      }
      return best;
    }
    let best = Infinity;
    for (const move of moves) {
      const score = minimax(applyMove(b, HUMAN, move), true, depth + 1, maxDepth, alpha, beta);
      best = Math.min(best, score);
      beta = Math.min(beta, score);
      if (beta <= alpha) break;
    }
    return best;
  }

  function bestMoveGeneric(b, maxDepth) {
    let best = { score: -Infinity, move: null };
    for (const move of legalMoves(b, AI)) {
      const score = minimax(applyMove(b, AI, move), false, 1, maxDepth, -Infinity, Infinity);
      if (score > best.score) best = { score, move };
    }
    return best.move;
  }

  function pickDepth(b, difficulty) {
    const inMovementPhase = countMarks(b, AI) >= MAX_MARKS && countMarks(b, HUMAN) >= MAX_MARKS;
    if (difficulty === 'hard') return inMovementPhase ? 2 : 3;
    return inMovementPhase ? 3 : 5;
  }

  function chooseAiMove(b, difficulty) {
    const moves = legalMoves(b, AI);
    if (!moves.length) return null;
    if (difficulty === 'easy') return moves[Math.floor(Math.random() * moves.length)];
    const depth = pickDepth(b, difficulty);
    if (difficulty === 'hard') {
      return Math.random() < 0.7 ? bestMoveGeneric(b, depth) : moves[Math.floor(Math.random() * moves.length)];
    }
    return bestMoveGeneric(b, depth);
  }

  function updateStatusForHumanTurn() {
    statusEl.textContent = countMarks(board, HUMAN) < MAX_MARKS
      ? "Your move — place an X"
      : "Your move — tap an X, then an empty cell to move it";
  }

  function onCellClick(i) {
    if (gameOver) return;
    const humanCount = countMarks(board, HUMAN);

    if (humanCount < MAX_MARKS) {
      if (board[i]) return;
      board[i] = HUMAN;
      afterHumanMove();
      return;
    }

    if (selected === null) {
      if (board[i] === HUMAN) { selected = i; render(); }
      return;
    }
    if (i === selected) { selected = null; render(); return; }
    if (board[i] === HUMAN) { selected = i; render(); return; }
    if (board[i]) return;

    board[selected] = null;
    board[i] = HUMAN;
    selected = null;
    afterHumanMove();
  }

  function afterHumanMove() {
    render();
    const result = winner(board);
    if (result) return finish(result);
    statusEl.textContent = "Computer's move...";
    setTimeout(computerMove, 300);
  }

  function computerMove() {
    if (gameOver) return;
    const move = chooseAiMove(board, difficultySel.value);
    if (!move) return;
    board = applyMove(board, AI, move);
    render();
    const result = winner(board);
    if (result) return finish(result);
    updateStatusForHumanTurn();
  }

  function finish(result) {
    gameOver = true;
    result.line.forEach(i => cells[i].classList.add('win'));
    statusEl.textContent = result.player === HUMAN ? 'You win! 🎉' : 'Computer wins!';
    cells.forEach(c => c.classList.add('disabled'));
  }

  function newGame() {
    board = Array(SIZE * SIZE).fill(null);
    gameOver = false;
    selected = null;
    updateStatusForHumanTurn();
    render();
  }

  resetBtn.addEventListener('click', newGame);
  newGame();
})();
</script>
</body>
</html>
