<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect 4 — Hamdan</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --board: #2563eb;
    --disc-red: #ef4444;
    --disc-yellow: #eab308;
    --win: #34d399;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --accent: #0284c7;
      --win: #059669;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .card {
    max-width: 480px;
    width: 100%;
    background: var(--card);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    text-align: center;
  }
  h1 {
    font-weight: 800;
    font-size: 2rem;
    margin-bottom: 1.25rem;
    color: var(--accent);
  }
  .difficulty-row {
    margin-bottom: 1.25rem;
  }
  .hint {
    font-size: 0.78rem;
    color: var(--muted);
    margin: 0 0 1.25rem;
  }
  .status {
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 1.25rem;
    min-height: 1.4rem;
  }
  .c4-board {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    background: var(--board);
    border-radius: 12px;
    padding: 10px;
    margin: 0 auto 1.5rem;
    max-width: 420px;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
  }
  .c4-cell {
    aspect-ratio: 1 / 1;
    border-radius: 50%;
    background: var(--bg);
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  .c4-cell.red { background: var(--disc-red); }
  .c4-cell.yellow { background: var(--disc-yellow); }
  .c4-cell.win { box-shadow: 0 0 0 3px var(--win) inset, 0 0 14px rgba(52, 211, 153, 0.6); }
  .controls {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  button, select, a.button {
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    border-radius: 10px;
    padding: 0.55rem 1.1rem;
    border: 1px solid var(--muted);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  button:hover, select:hover, a.button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  footer {
    margin-top: 2rem;
    color: var(--muted);
    font-size: 0.8rem;
  }
  .back-btn {
    position: fixed;
    top: 1.25rem;
    left: 1.25rem;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--card);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-size: 1.4rem;
    line-height: 1;
    border: 1px solid var(--muted);
    box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    transition: border-color 0.15s ease, color 0.15s ease, transform 0.15s ease;
  }
  .back-btn:hover {
    border-color: var(--accent);
    transform: translateX(-2px);
  }
  .home-icon {
    font-size: 1.3rem;
    line-height: 1;
    filter: grayscale(1) brightness(0);
  }
</style>
</head>
<body>
  <a class="back-btn" href="./" aria-label="Back to home"><span class="home-icon">&#127968;</span></a>
  <main class="card">
    <h1>Connect 4</h1>
    <div class="difficulty-row">
      <select id="difficulty">
        <option value="unbeatable" selected>Unbeatable</option>
        <option value="hard">Hard</option>
        <option value="easy">Easy</option>
      </select>
    </div>
    <p class="hint">Tap any cell in a column to drop your disc there.</p>
    <div class="status" id="status">Your move — drop a red disc</div>
    <div class="c4-board" id="board"></div>
    <div class="controls">
      <button id="reset">New Game</button>
    </div>
    <footer>You: Red &nbsp;·&nbsp; Computer: Yellow</footer>
  </main>

<script>
(function () {
  const ROWS = 6, COLS = 7;
  const HUMAN = 'red', AI = 'yellow';
  const COL_ORDER = [3, 2, 4, 1, 5, 0, 6];

  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const resetBtn = document.getElementById('reset');
  const difficultySel = document.getElementById('difficulty');

  let board = [];
  let gameOver = false;
  let cellEls = [];

  function makeEmptyBoard() {
    return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  }

  function cloneBoard(b) {
    return b.map(row => row.slice());
  }

  function validColumns(b) {
    const cols = [];
    for (let c = 0; c < COLS; c++) if (b[0][c] === null) cols.push(c);
    return cols;
  }

  function dropRow(b, col) {
    for (let r = ROWS - 1; r >= 0; r--) {
      if (b[r][col] === null) return r;
    }
    return -1;
  }

  function applyDrop(b, col, mark) {
    const nb = cloneBoard(b);
    const r = dropRow(nb, col);
    if (r === -1) return null;
    nb[r][col] = mark;
    return { board: nb, row: r, col };
  }

  function checkWinAt(b, row, col, mark) {
    const dirs = [[0,1],[1,0],[1,1],[1,-1]];
    for (const [dr, dc] of dirs) {
      const line = [[row, col]];
      for (let s = 1; s < 4; s++) {
        const r = row + dr * s, c = col + dc * s;
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS || b[r][c] !== mark) break;
        line.push([r, c]);
      }
      for (let s = 1; s < 4; s++) {
        const r = row - dr * s, c = col - dc * s;
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS || b[r][c] !== mark) break;
        line.unshift([r, c]);
      }
      if (line.length >= 4) return line;
    }
    return null;
  }

  function isFull(b) {
    return validColumns(b).length === 0;
  }

  function windowScore(counts, mark, other) {
    const markCount = counts[mark], otherCount = counts[other], empty = counts.empty;
    if (markCount === 4) return 100000;
    if (markCount === 3 && empty === 1) return 8;
    if (markCount === 2 && empty === 2) return 3;
    if (otherCount === 3 && empty === 1) return -80;
    return 0;
  }

  function evaluate(b) {
    let score = 0;
    const centerCol = Math.floor(COLS / 2);
    for (let r = 0; r < ROWS; r++) {
      if (b[r][centerCol] === AI) score += 3;
      else if (b[r][centerCol] === HUMAN) score -= 3;
    }

    function countWindow(cells) {
      const counts = { [AI]: 0, [HUMAN]: 0, empty: 0 };
      for (const v of cells) {
        if (v === null) counts.empty++;
        else counts[v]++;
      }
      return counts;
    }

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c <= COLS - 4; c++) {
        const counts = countWindow([b[r][c], b[r][c+1], b[r][c+2], b[r][c+3]]);
        score += windowScore(counts, AI, HUMAN);
      }
    }
    for (let c = 0; c < COLS; c++) {
      for (let r = 0; r <= ROWS - 4; r++) {
        const counts = countWindow([b[r][c], b[r+1][c], b[r+2][c], b[r+3][c]]);
        score += windowScore(counts, AI, HUMAN);
      }
    }
    for (let r = 0; r <= ROWS - 4; r++) {
      for (let c = 0; c <= COLS - 4; c++) {
        const counts = countWindow([b[r][c], b[r+1][c+1], b[r+2][c+2], b[r+3][c+3]]);
        score += windowScore(counts, AI, HUMAN);
      }
    }
    for (let r = 3; r < ROWS; r++) {
      for (let c = 0; c <= COLS - 4; c++) {
        const counts = countWindow([b[r][c], b[r-1][c+1], b[r-2][c+2], b[r-3][c+3]]);
        score += windowScore(counts, AI, HUMAN);
      }
    }
    return score;
  }

  function minimax(b, depth, maxDepth, isMaximizing, alpha, beta) {
    const cols = validColumns(b);
    if (depth >= maxDepth || cols.length === 0) return evaluate(b);
    const mark = isMaximizing ? AI : HUMAN;
    if (isMaximizing) {
      let best = -Infinity;
      for (const c of COL_ORDER) {
        if (!cols.includes(c)) continue;
        const res = applyDrop(b, c, mark);
        const win = checkWinAt(res.board, res.row, res.col, mark);
        const score = win ? 100000 - depth : minimax(res.board, depth + 1, maxDepth, false, alpha, beta);
        best = Math.max(best, score);
        alpha = Math.max(alpha, score);
        if (beta <= alpha) break;
      }
      return best;
    }
    let best = Infinity;
    for (const c of COL_ORDER) {
      if (!cols.includes(c)) continue;
      const res = applyDrop(b, c, mark);
      const win = checkWinAt(res.board, res.row, res.col, mark);
      const score = win ? depth - 100000 : minimax(res.board, depth + 1, maxDepth, true, alpha, beta);
      best = Math.min(best, score);
      beta = Math.min(beta, score);
      if (beta <= alpha) break;
    }
    return best;
  }

  function bestColumn(b, maxDepth) {
    const cols = validColumns(b);
    let best = { score: -Infinity, col: cols[0] };
    for (const c of COL_ORDER) {
      if (!cols.includes(c)) continue;
      const res = applyDrop(b, c, AI);
      const win = checkWinAt(res.board, res.row, res.col, AI);
      const score = win ? 100000 : minimax(res.board, 1, maxDepth, false, -Infinity, Infinity);
      if (score > best.score) best = { score, col: c };
    }
    return best.col;
  }

  function chooseAiColumn(b, difficulty) {
    const cols = validColumns(b);
    if (!cols.length) return null;
    if (difficulty === 'easy') return cols[Math.floor(Math.random() * cols.length)];
    if (difficulty === 'hard') {
      return Math.random() < 0.7 ? bestColumn(b, 3) : cols[Math.floor(Math.random() * cols.length)];
    }
    return bestColumn(b, 6);
  }

  function render() {
    boardEl.innerHTML = '';
    cellEls = [];
    for (let r = 0; r < ROWS; r++) {
      cellEls.push([]);
      for (let c = 0; c < COLS; c++) {
        const cell = document.createElement('div');
        const val = board[r][c];
        cell.className = 'c4-cell' + (val ? ' ' + val : '');
        cell.addEventListener('click', () => onColumnClick(c));
        boardEl.appendChild(cell);
        cellEls[r].push(cell);
      }
    }
  }

  function highlightWin(line) {
    for (const [r, c] of line) cellEls[r][c].classList.add('win');
  }

  function onColumnClick(col) {
    if (gameOver) return;
    const res = applyDrop(board, col, HUMAN);
    if (!res) return;
    board = res.board;
    render();
    const win = checkWinAt(board, res.row, res.col, HUMAN);
    if (win) return finish(HUMAN, win);
    if (isFull(board)) return finish(null, []);
    statusEl.textContent = "Computer's move...";
    setTimeout(computerMove, 350);
  }

  function computerMove() {
    if (gameOver) return;
    const col = chooseAiColumn(board, difficultySel.value);
    if (col === null || col === undefined) return;
    const res = applyDrop(board, col, AI);
    board = res.board;
    render();
    const win = checkWinAt(board, res.row, res.col, AI);
    if (win) return finish(AI, win);
    if (isFull(board)) return finish(null, []);
    statusEl.textContent = "Your move — drop a red disc";
  }

  function finish(winnerMark, line) {
    gameOver = true;
    if (!winnerMark) {
      statusEl.textContent = "It's a draw!";
      return;
    }
    highlightWin(line);
    statusEl.textContent = winnerMark === HUMAN ? 'You win! 🎉' : 'Computer wins!';
  }

  function newGame() {
    board = makeEmptyBoard();
    gameOver = false;
    statusEl.textContent = "Your move — drop a red disc";
    render();
  }

  resetBtn.addEventListener('click', newGame);
  newGame();
})();
</script>
</body>
</html>
